<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2f7d6b" />
    <meta name="description" content="Заметки, задачи и календарь с хиджра-датами." />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>notedocal — заметки · задачи · календарь</title>
    <script>
      // Применяем тему до отрисовки, чтобы не было мигания.
      try {
        var t = localStorage.getItem('ndc.theme');
        if (t !== 'light' && t !== 'dark') {
          t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
